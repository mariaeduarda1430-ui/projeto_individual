<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de login</title>
    <link rel="stylesheet" href="./css/style login.css">

      <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Agbalumo&family=Matemasie&family=Noto+Serif:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Agbalumo&family=Manrope:wght@200..800&family=Matemasie&family=Noto+Serif:ital,wght@0,100..900;1,100..900&family=Send+Flowers&display=swap"
        rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Agbalumo&family=Manrope:wght@200..800&family=Matemasie&family=Noto+Serif:ital,wght@0,100..900;1,100..900&family=Send+Flowers&display=swap"
        rel="stylesheet">
</head>
<body>
    <div class="pagina">
    <div class="titulo">
        <div class="agbalumo-regular">
            <span>NutriNobre</span>
        </div>
        
    </div>
    <div class="caixa-maior">
    <div class="caixa">
        <div class="titulo-caixa">
            <span>Bem-Vindo de volta à Nobreza Pet</span>
        </div>
        <div class="subt-caixa">
            <span>ACESSO EXCLUSIVO À VITALIDADE</span>
        </div>
        <div class="campos">
            <div class="email">
                <span>ENDEREÇO DE EMAIL</span><br>
                <input type="text" id="input_email" placeholder="✉ curador@nutrinobre.com">
            </div>
            <div class="senha">
               <span> CHAVE DE ACESSO</span><br>
                <input type="password" id="input_senha" placeholder="🔒︎ insira sua senha">
            </div>
            <div class="botao">
                <div class="b">
                    <button onclick="entrar()">ENTRAR NA PÁGINA</button>
                </div>
                <div class="cadastro">
                    <span>AINDA NÃO É UM MENBRO?</span>
                    <a href="./cadastro.html">SOLICITAR ACESSO PARA A NOBREZA</a>
                </div>
            </div>
        </div>
    </div>
    </div>
    </div>
</body>
</html>
<script>
    function entrar() {
       let email = input_email.value;
    let senha = input_senha.value;

    if (email == "" || senha == "") {
        alert("Por favor, preencha todos os campos.");
        return false;
    }

    console.log("FORM LOGIN: ", email);

    fetch("/usuarios/autenticar", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            emailServer: email,
            senhaServer: senha
        })
    }).then(function (resposta) {
        if (resposta.ok) {
            console.log(resposta);

            resposta.json().then(json => {
                console.log(json);
                console.log(JSON.stringify(json));

                // AQUI ESTÁ O SEGREDO: Salva os dados na sessão do navegador
                sessionStorage.EMAIL_USUARIO = json.email; //Se o banco de dados encontrar o usuário, ele retorna os dados (id, nome, email). Nós guardamos isso na "memória" do navegador.
                sessionStorage.NOME_USUARIO = json.nome;
                sessionStorage.ID_USUARIO = json.id;

                alert("Login realizado com sucesso! Redirecionando...");

                setTimeout(function () {
                    window.location = "./inicial.html";
                }, 1000);
            });

        } else {
            console.log("Houve um erro ao tentar realizar o login!");
            resposta.text().then(texto => {
                console.error(texto);
                alert("Email ou senha inválidos.");
            });
        }

    }).catch(function (erro) {
        console.log(erro);
    })

    return false;
}
</script>
